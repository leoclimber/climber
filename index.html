async function ai(prompt,lang){
  const ln={en:"English",pt:"Brazilian Portuguese",es:"Spanish"};
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:"You are a top social media expert for small businesses. Respond ONLY in "+ln[lang]+". Return ONLY valid JSON, no extra text.\n"+prompt})});
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text||"";
}
async function img(prompt){
  try {
    const r=await fetch("/api/dalle",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const d=await r.json();
    if(d.error) console.error("DALL-E error:",d.error);
    return {url:d.url||null,error:d.error||null};
  } catch(e) {
    console.error("DALL-E fetch failed:",e.message);
    return {url:null,error:e.message};
  }
}

  const[loading,setLoading]=React.useState(false);

  async function build(){
    if(!biz||!type||loading)return;
    setLoading(true);setWeeks(null);
    try{
      const dp=details?"\nBusiness details: "+details:"";
      const raw=await ai('Business:"'+biz+'",Type:"'+type+'"'+dp+'\nCreate a 30-day social media content calendar. Mix platforms. Return ONLY valid JSON array of 4 weeks:\n[{"week":1,"days":[{"day":1,"platform":"Instagram","goal":"2-4 words","caption":"1-2 sentences","emoji":"1 emoji"},...]},...]',lang);
      const wm=raw.match(/\[[\s\S]*\]/);if(!wm)throw new Error("Bad cal response");setWeeks(JSON.parse(wm[0]));
    }catch(e){setWeeks([]);}
    setLoading(false);
  }
