async function ai(prompt,lang){
  const ln={en:"English",pt:"Brazilian Portuguese",es:"Spanish"};
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:"You are a top social media expert for small businesses. Respond ONLY in "+ln[lang]+". Return ONLY valid JSON, no extra text.\n"+prompt})});
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text||"";
}
async function img(prompt){
  try {
    const r=await fetch("/api/dalle",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    return {url:d.url||null,error:null};
  } catch(e) {
    return {url:null,error:e.message||"Unknown error"};
  }
}

function App(){
  const[lang,setLang]=React.useState("en");
  const[tab,setTab]=React.useState(0);
  const[scrolled,setScrolled]=React.useState(false);
  const[email,setEmail]=React.useState("");
  const[usage,setUsage]=React.useState(null);
  const[inspirationEntry,setInspirationEntry]=React.useState(null);
  const[createPrompt,setCreatePrompt]=React.useState(null);
  const t=T[lang];

  React.useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>40);
    window.addEventListener("scroll",h);
    return()=>window.removeEventListener("scroll",h);
  },[]);

  React.useEffect(()=>{
    const saved=window.localStorage?window.localStorage.getItem("climber_email"):null;
    if(saved) setEmail(saved);
  },[]);

  async function checkUsage(e){
    if(!e)return;
    try{
      const r=await fetch("/api/user?email="+encodeURIComponent(e));
      const d=await r.json();
      if(!d.error) setUsage(d);
    }catch(err){}
  }

  function saveEmail(e){
    setEmail(e);
    if(window.localStorage) window.localStorage.setItem("climber_email",e);
    checkUsage(e);
  }

  React.useEffect(()=>{
    if(email) checkUsage(email);
  },[email]);

  const toApp=()=>document.getElementById("app").scrollIntoView({behavior:"smooth"});

  return React.createElement('div',{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh"}},
    React.createElement('nav',{style:{position:"fixed",top:0,left:0,right:0,zIndex:100,background:scrolled?"rgba(248,250,252,.96)":"transparent",backdropFilter:scrolled?"blur(16px)":"none",borderBottom:scrolled?"1px solid #e2e8f0":"none",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .3s"}},
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement('div',{style:{width:32,height:32,background:"#0f172a",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#f59e0b",fontWeight:900,fontSize:16}},"C"),
        React.createElement('span',{style:{fontWeight:900,fontSize:18,color:"#0f172a"}},"Climber")
      ),
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:6}},
        ["en","pt","es"].map(l=>React.createElement('button',{key:l,onClick:()=>setLang(l),style:{padding:"5px 10px",borderRadius:8,border:"1.5px solid "+(lang===l?"#0f172a":"#e2e8f0"),background:lang===l?"#0f172a":"transparent",color:lang===l?"#fff":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}},T[l].flag+" "+T[l].code)),
        React.createElement('button',{onClick:toApp,style:{padding:"9px 18px",background:"#0f172a",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",marginLeft:4}},t.startBtn)
      )
    ),
    React.createElement('section',{style:{paddingTop:110,paddingBottom:70,paddingLeft:24,paddingRight:24,maxWidth:820,margin:"0 auto",textAlign:"center"}},
      React.createElement('div',{style:{display:"inline-flex",alignItems:"center",gap:8,background:"#fef3c7",border:"1.5px solid #f59e0b",borderRadius:100,padding:"6px 18px",marginBottom:24}},
        React.createElement('div',{style:{width:7,height:7,borderRadius:"50%",background:"#f59e0b"}}),
        React.createElement('span',{style:{fontSize:13,color:"#92400e",fontWeight:700}},t.badge)
      ),
      React.createElement('h1',{style:{fontSize:"clamp(40px,7vw,80px)",fontWeight:900,color:"#0f172a",letterSpacing:"-3px",lineHeight:.95,marginBottom:20}},t.h1,React.createElement('br'),React.createElement('span',{style:{color:"#f59e0b"}},t.h1b)),
      React.createElement('p',{style:{fontSize:18,color:"#64748b",maxWidth:500,margin:"0 auto 32px",lineHeight:1.65}},t.sub),
      React.createElement('div',{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:14,flexWrap:"wrap"}},
        React.createElement('button',{onClick:toApp,style:{padding:"14px 28px",background:"#0f172a",color:"#fff",border:"none",borderRadius:14,fontWeight:800,fontSize:15,cursor:"pointer"}},t.cta),
        React.createElement('span',{style:{fontSize:13,color:"#94a3b8"}},t.note)
      )
    ),
    React.createElement('section',{id:"app",style:{padding:"0 24px 80px",maxWidth:820,margin:"0 auto"}},
      React.createElement('div',{style:{background:"#fff",border:"2px solid #e2e8f0",borderRadius:24,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,.08)"}},
        React.createElement('div',{style:{borderBottom:"2px solid #e2e8f0",display:"flex",overflowX:"auto"}},
          t.tabs.map((tb,i)=>React.createElement('button',{key:i,onClick:()=>setTab(i),style:{flex:"0 0 auto",padding:"14px 20px",background:"transparent",border:"none",borderBottom:tab===i?"3px solid #0f172a":"3px solid transparent",color:tab===i?"#0f172a":"#94a3b8",fontWeight:700,fontSize:14,cursor:"pointer",whiteSpace:"nowrap",marginBottom:"-2px"}},tb))
        ),
        React.createElement('div',{style:{padding:24}},
          React.createElement('div',{style:{display:tab===0?"block":"none"}},React.createElement(CreateTab,{t,lang,email,usage,setUsage,saveEmail,setTab,onCreatePrompt:createPrompt})),
          React.createElement('div',{style:{display:tab===1?"block":"none"}},React.createElement(CaptionsTab,{t,lang,email,usage,setUsage,saveEmail,setTab})),
          React.createElement('div',{style:{display:tab===2?"block":"none"}},React.createElement(InspirationTab,{t,lang,email,saveEmail,setTab,onSendToCalendar:(entry)=>setInspirationEntry(entry),onSendToCreate:(prompt)=>setCreatePrompt(prompt)})),
          React.createElement('div',{style:{display:tab===3?"block":"none"}},React.createElement(CalendarTab,{t,lang,email,usage,setUsage,saveEmail,setTab,inspirationEntry})),
          React.createElement('div',{style:{display:tab===4?"block":"none"}},React.createElement(PricingTab,{t,email}))
        )
      )
    ),
    React.createElement('footer',{style:{textAlign:"center",padding:"24px",borderTop:"1px solid #e2e8f0",color:"#94a3b8",fontSize:13}},t.footer)
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
